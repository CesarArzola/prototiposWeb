<!DOCTYPE html>
<!-- Declara el tipo de documento. Indica al navegador que usará HTML5 -->
<html lang="es">
<!-- Elemento principal del documento HTML.
lang="es" indica que el contenido está en "español" -->
<head> <!-- Seccion de configuracion del documento -->
    <meta charset="UTF-8">
    <!-- Define la codificacion de caracteres.
    UTF-8 permite usar correctamente tildes, ñ, simbolos, etc -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que el sitio sea responsive.
    Permite que el diseño se adapte correctamente a celulares y tablets -->
    <title>Practicando HTML -  img y video</title>
    <!-- Titulo que aparece en el navegador -->
    <meta name="author" content="César El Pro">
    <!-- Indica quien creo el sitio web -->

    <link rel="stylesheet" href="static/scc/style.css">
    <!-- Conexión con hoja CSS de estilos -->
</head>

<body>
    <header> <!-- Encabezado del documento -->
        <h1>Sitio multimedia personal</h1>
    </header>
    <hr> <!-- Crea una linea de división -->
    <main><!-- Seccion principal del documento -->
        <h2>Mis datos:</h2>
        <p>Nombre: César Arzola<br> <!-- br es un salto de linea -->
            Curso: 3°C
        </p>
        <hr>
        <h2>Galería multimedia</h2>
        <p>Imágen de ejemplo</p>
        <img src="static/images/imagen1.png" alt="primera imagen" width="300"> 
        <img src="static/images/imagen2.png" alt="segunda imagen" width="208">
        <img src="static/images/imagen3.png" alt="tercera imagen" width="300">
        <hr>
        <h2>Videos</h2>
        <video width="600" controls>
            <source src="static/videos/Zell, Neo Pistea, DUKI - Starboy Remix (Video Oficial) - Zell (1080p, h264).mp4"
            type="video/mp4">
        </video>
        <video width="600" controls> 
        <source src="static/videos/MILO J - A VOS (Video Oficial) - MILO J (1080p, h264).mp4"
            type="video/mp4">
        </video>
        <footer>
            <p style="text-align:center">Todos los derechos reservados
                -<a href="https://es.wikipedia.org/wiki/Duki">Más Información</a> <!-- Etiqueta <a></a> para vínculos -->
            </p>
        </footer>
    </main>
</body>

</html>
